# User profile for OpenLOS assistant
# Edit values to customize planning, schedule, and digests.

name: "Your Name"
timezone: "UTC"                 # TZ database string, e.g. "America/Los_Angeles"

work_hours:
  start: "09:00"                # local time, 24h
  end:   "17:30"

work_days:                      # days considered for scheduling
  - Mon
  - Tue
  - Wed
  - Thu
  - Fri

session_length_minutes: 60      # preferred focus session length
meeting_buffer_minutes: 15      # buffer before/after meetings

preferred_focus_themes:
  - "Deep work"
  - "Admin"
  - "Learning"

top_goals:
  - "Ship Q2 roadmap"
  - "Write research paper"

notification_preferences:
  digest_time: "07:30"           # local time for daily digest (HH:MM)
  enabled: true
  channel: "cli"                 # cli | email | slack

task_defaults:
  default_estimate_hours: 1
  default_priority: "medium"

calendar_integration:
  enabled: false
  provider: "google"
  account_email: ""

privacy:
  local_only: true               # true => do not attempt external sync
  share_with: []                 # list of collaborators allowed to read profile
